<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Romantic Starry Night</title>

<style>
html,body{
	margin:0px;
	width:100%;
	height:100%;
	overflow:hidden;
	background: #000003; /* Pure deep space black/blue */
}

#canvas{
	position:absolute;
	width:100%;
	height:100%;
    z-index: 1;
}
</style>

</head>
<body>

<canvas id="canvas"></canvas>

<script>
function project3D(x,y,z,vars){
	var p,d;
	x-=vars.camX;
	y-=vars.camY;
	z-=vars.camZ;
	p=Math.atan2(x,z);
	d=Math.sqrt(x*x+z*z);
	x=Math.sin(p-vars.yaw)*d;
	z=Math.cos(p-vars.yaw)*d;
	p=Math.atan2(y,z);
	d=Math.sqrt(y*y+z*z);
	y=Math.sin(p-vars.pitch)*d;
	z=Math.cos(p-vars.pitch)*d;
	var rx1=-1000;
	var ry1=1;
	var rx2=1000;
	var ry2=1;
	var rx3=0;
	var ry3=0;
	var rx4=x;
	var ry4=z;
	var uc=(ry4-ry3)*(rx2-rx1)-(rx4-rx3)*(ry2-ry1);
	var ua=((rx4-rx3)*(ry1-ry3)-(ry4-ry3)*(rx1-rx3))/uc;
	var ub=((rx2-rx1)*(ry1-ry3)-(ry2-ry1)*(rx1-rx3))/uc;
	if(!z)z=0.000000001;
	if(ua>0&&ua<1&&ub>0&&ub<1){
		return {
			x:vars.cx+(rx1+ua*(rx2-rx1))*vars.scale,
			y:vars.cy+y/z*vars.scale,
			d:(x*x+y*y+z*z)
		};
	}else{
		return { d:-1 };
	}
}


function elevation(x,y,z){
	var dist = Math.sqrt(x*x+y*y+z*z);
	if(dist && z/dist>=-1 && z/dist <=1) return Math.acos(z / dist);
	return 0.00000001;
}

function process(vars){
	if(vars.points.length<vars.initParticles) for(var i=0;i<10;++i) spawnParticle(vars);
	var p,d,t;
	
    // Slowly move the camera through space to create a dreamy voyage effect
	vars.camZ += 0.1;
    // Gentle rotation of the camera
    vars.yaw += 0.002;
    vars.pitch = Math.sin(vars.frameNo * 0.001) * 0.2;
	
	for(var i=0;i<vars.points.length;++i){
		var pt = vars.points[i];
		// Move particles slightly to simulate floating
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.z += pt.vz;

        // Twinkle effect
        pt.alpha = 0.5 + Math.sin(vars.frameNo * pt.twinkleSpeed + pt.twinkleOffset) * 0.5;

        // If particle falls too far behind the camera, respawn it ahead
		if((pt.z - vars.camZ) < -10){
			vars.points.splice(i,1);
			spawnParticle(vars, true);
		}
	}
}

function sortFunction(a,b){
	return b.dist-a.dist;
}

function draw(vars){
    // Dark fading trail to give a glowing tail effect to fast stars
	vars.ctx.globalCompositeOperation = "source-over";
	vars.ctx.globalAlpha = 0.3;
	vars.ctx.fillStyle = "#000005"; 
	vars.ctx.fillRect(0, 0, canvas.width, canvas.height);
	
    // Glow effect for stars
    vars.ctx.globalCompositeOperation = "lighter";
	var point,x,y,z,size;
	for(var i=0;i<vars.points.length;++i){
		x=vars.points[i].x;
		y=vars.points[i].y;
		z=vars.points[i].z;
		point=project3D(x,y,z,vars);
		if(point.d != -1){
			vars.points[i].dist=point.d;
			size=1+vars.points[i].radius/(1+point.d);
            
            // Render only if within visible range
			if(point.x>-1&&point.x<vars.canvas.width&&point.y>-1&&point.y<vars.canvas.height){
                vars.ctx.globalAlpha = vars.points[i].alpha * (1 - Math.min(point.d / 10000, 1)); // Fade in distance
                
                var c = vars.points[i].color;
                vars.ctx.fillStyle = "rgba(" + c[0] + "," + c[1] + "," + c[2] + ", 1)";
                
                vars.ctx.beginPath();
                vars.ctx.arc(point.x, point.y, size/1.5, 0, Math.PI*2);
                vars.ctx.fill();

                // Add a core highlight to larger stars for extreme romantic glow
                if(size > 2) {
                    vars.ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                    vars.ctx.beginPath();
                    vars.ctx.arc(point.x, point.y, size/4, 0, Math.PI*2);
                    vars.ctx.fill();
                }
            }
		}
	}
	vars.points.sort(sortFunction);
}

function spawnParticle(vars, forward){
	var pt={};
    
    // Spawn in a vast cylindrical area around the camera's path
    var radius = 20 + Math.random() * 60;
    var angle = Math.random() * Math.PI * 2;
    
	pt.x = Math.sin(angle) * radius;
	pt.y = (Math.random() - 0.5) * 80; 
    
    if (forward) {
        // Spawn far ahead
        pt.z = vars.camZ + 150 + Math.random() * 50;
    } else {
        // Initial spawn randomly along the z-axis
        pt.z = vars.camZ - 10 + Math.random() * 200;
    }
	
    // Slight drift
	pt.vx = (Math.random() - 0.5) * 0.02;
	pt.vy = (Math.random() - 0.5) * 0.02;
    pt.vz = (Math.random() - 0.5) * 0.02;

	pt.radius = 100 + 1000 * Math.random(); 
    
    pt.twinkleSpeed = 0.02 + Math.random() * 0.05;
    pt.twinkleOffset = Math.random() * Math.PI * 2;

    // Star Colors: Deep Romantic Starry Night (Cyan, Blue, Purple, Pink, Gold, White)
    var rand = Math.random();
    if(rand < 0.1) pt.color = [255, 255, 255]; // Pure White
    else if(rand < 0.3) pt.color = [255, 215, 0]; // Gold/Warm
    else if(rand < 0.5) pt.color = [255, 105, 180]; // Pink
    else if(rand < 0.7) pt.color = [138, 43, 226]; // Purple
    else if(rand < 0.9) pt.color = [0, 191, 255]; // Cyan/Blue
    else pt.color = [20, 50, 255]; // Deep Blue Nebula Dust

	vars.points.push(pt);	
}

function frame(vars) {
	if(vars === undefined){
		var vars={};
		vars.canvas = document.querySelector("canvas");
		vars.ctx = vars.canvas.getContext("2d");
		vars.canvas.width = document.body.clientWidth;
		vars.canvas.height = document.body.clientHeight;
		window.addEventListener("resize", function(){
			vars.canvas.width = document.body.clientWidth;
			vars.canvas.height = document.body.clientHeight;
			vars.cx=vars.canvas.width/2;
			vars.cy=vars.canvas.height/2;
		}, true);
		vars.frameNo=0;

		vars.camX = 0;
		vars.camY = 0;
		vars.camZ = 0;
		vars.pitch = 0;
		vars.yaw = 0;
		vars.cx = vars.canvas.width/2;
		vars.cy = vars.canvas.height/2;
		vars.bounding = 10;
		vars.scale = 600;

		vars.points = [];
		vars.initParticles = 2500; // Massive amount of stars
	}

	vars.frameNo++;
	requestAnimationFrame(function() {
		frame(vars);
	});

	process(vars);
	draw(vars);
}
frame();
</script>

</body>
</html>
